<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>Document</title>
</head>

<body>
  <header id="header_hero">
    <div class="container">
      <div class="row">
        <div class="hero__logo__main">
          <a href="#">
            <img src="img/svg/Logo.svg" alt="main logo">
          </a>
        </div>
        <nav class="hero__nav">
          <ul class="hero__nav__list">
            <li class="hero__nav__item">
              <a class="hero__nav__link active" href="#">About amid</a>
            </li>
            <li class="hero__nav__item">
              <a class="hero__nav__link" href="#">Features</a>
            </li>
            <li class="hero__nav__item">
              <a class="hero__nav__link" href="#">Portfolio</a>
            </li>
            <li class="hero__nav__item">
              <a class="hero__nav__link" href="#">Reviews</a>
            </li>
          </ul>
        </nav>
        <a class="hero__btn" href="#">Login</a>
      </div>
    </div>
  </header>
  <section id="content__hero">
    <div class="container">
      <div class="content__row">
        <div class="content__hero">
          <span class="work__text">It works!</span>
          <h1 class="content__hero__title">Try Our Business Ideas to grow Rapidly</h1>
          <p class="content__hero__text">We understand how desperatly you want to grow in the business world & our motto
            is to help you with practicale idea and plan </p>
          <div class="btn-bar">
            <a class="btn-barLink1" href="#">Get Started</a>
            <div class="btn__flex">
              <img class="barLink__img" src="img/svg/play.svg" alt="video play">
              <a class="btn-barLink" href="#">DEMO VIDEO</a>
            </div>
          </div>
        </div>
        <div class="content__hero__img">
          <img src="img/png/hero-group__girl__radian.png" alt="radius">
          <img src="img/png/hero__girl.png" alt="radius">
          <img src="img/png/hero-group__girl__dot.png" alt="radius">
          <img src="img/svg/hero-media__group.svg" alt="media group">
        </div>
      </div>
    </div>
  </section>
  <section id="partners">
    <div class="container">
      <div class="partners__list">
        <ul class="partners__list__box">
          <li class="partners__item">
            <img src="img/png/netflix.png" alt="netflix partners">
          </li>
          <li class="partners__item">
            <img src="img/png/forbes.png" alt="forbers partners">
          </li>
          <li class="partners__item">
            <img src="img/png/itel.png" alt="itel partners">
          </li>
          <li class="partners__item">
            <img src="img/png/fedex.png" alt="fedex partners">
          </li>
        </ul>
        <ul class="partners__list__box">
          <li class="partners__item">
            <img src="img/png/audiomax.png" alt="audiomax partners">
          </li>
          <li class="partners__item">
            <img src="img/png/penguines.png" alt="penguines partners">
          </li>
          <li class="partners__item">
            <img src="img/png/Ellipse 91.png" alt="Ellipse partners">
          </li>
          <li class="partners__item">
            <img src="img/png/gotomeeting.png" alt="gotomeeting partners">
          </li>
        </ul>
      </div>
    </div>
  </section>
</body>

</html>
